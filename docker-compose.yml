services:

  # ── Storage ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      retries: 5

  # ── Processing ───────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.3
    command: bash -c "/opt/spark/bin/spark-class org.apache.spark.deploy.master.Master"
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./jars:/opt/spark/extra-jars
      - ./src:/opt/spark/src

  spark-worker-1:
    image: apache/spark:3.5.3
    command: bash -c "/opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077"
    depends_on:
      - spark-master
    volumes:
      - ./jars:/opt/spark/extra-jars

  spark-worker-2:
    image: apache/spark:3.5.3
    command: bash -c "/opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077"
    depends_on:
      - spark-master
    volumes:
      - ./jars:/opt/spark/extra-jars

  # ── ML ───────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.15.1
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlartifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlartifacts

  # ── Simulation ───────────────────────────────────────
  sinergym:
    image: sailugr/sinergym:latest
    volumes:
      - ./scripts:/app/scripts
      - ./data/sinergym:/app/output
    profiles:
      - simulation

  # ── Monitoring ───────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

volumes:
  minio_data:
  timescale_data:
  mlflow_data:
